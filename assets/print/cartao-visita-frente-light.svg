<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="96mm" height="56mm" viewBox="0 0 96 56"
     role="img" aria-label="Bahia Tecnologia — Cartão de Visita Frente (Light)">

  <defs>
    <linearGradient id="bt-accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2E8BE6"/>
      <stop offset="55%"  stop-color="#1FB6A8"/>
      <stop offset="100%" stop-color="#25D366"/>
    </linearGradient>
    <linearGradient id="bt-brand-h" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2E8BE6"/>
      <stop offset="55%"  stop-color="#1FB6A8"/>
      <stop offset="100%" stop-color="#25D366"/>
    </linearGradient>
    <clipPath id="artboard-clip">
      <rect width="96" height="56"/>
    </clipPath>
  </defs>

  <!-- Background — off-white, warm and clean -->
  <rect width="96" height="56" fill="#FAFBFC"/>

  <!-- Decorative speech-bubble echo — very subtle gray on white -->
  <g opacity="0.55" transform="translate(58, 18) scale(2.6)" clip-path="url(#artboard-clip)">
    <path fill="none" stroke="#E6EAF0" stroke-width="0.8"
      d="M2 1.25 h9.2 a3.5 3.5 0 0 1 0 7 h-1.5 l-1.5 1.5 v-1.5 h-1.5 a1 1 0 0 1 -1 -1 V2.25 a1 1 0 0 1 1 -1 z
         M5.5 3 h1.5 a1.5 1.5 0 0 1 0 3 h-1.5 z
         M5.5 6.5 h1.75 a1.5 1.5 0 0 1 0 3 h-1.75 z"/>
  </g>

  <!-- Accent gradient bar — bottom edge, full width, 0.8mm tall -->
  <rect x="0" y="55.2" width="96" height="0.8" fill="url(#bt-accent-line)"/>

  <!-- Brand mark (speech-bubble "B") — gradient, works on white -->
  <g transform="translate(8, 9) scale(0.29167)" clip-path="url(#artboard-clip)">
    <defs>
      <linearGradient id="bt-icon-grad-l" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%"   stop-color="#2E8BE6"/>
        <stop offset="55%"  stop-color="#1FB6A8"/>
        <stop offset="100%" stop-color="#25D366"/>
      </linearGradient>
    </defs>
    <path fill="url(#bt-icon-grad-l)"
      d="M10 6 h18 a14 14 0 0 1 0 28 h-6 l-6 6 v-6 h-6 a4 4 0 0 1 -4 -4 V10 a4 4 0 0 1 4 -4 z
         M22 12 h6 a6 6 0 0 1 0 12 h-6 z
         M22 26 h7 a6 6 0 0 1 0 12 h-7 z" fill-rule="evenodd"/>
    <g fill="#FFFFFF">
      <circle cx="15" cy="20" r="1.6"/>
      <circle cx="20" cy="20" r="1.6"/>
      <circle cx="25" cy="20" r="1.6"/>
    </g>
  </g>

  <!-- Company wordmark — navy-950 on white -->
  <text x="24" y="16.5"
        font-family="Sora, 'Plus Jakarta Sans', ui-sans-serif, sans-serif"
        font-weight="700"
        font-size="7.5"
        fill="#0A1628"
        letter-spacing="0.4">BAHIA</text>
  <text x="24" y="23"
        font-family="Sora, 'Plus Jakarta Sans', ui-sans-serif, sans-serif"
        font-weight="700"
        font-size="5.2"
        fill="#0A1628"
        letter-spacing="1.8">TECNOLOGIA</text>

  <!-- Horizontal rule below wordmark — gradient thin line -->
  <line x1="24" y1="25.2" x2="86" y2="25.2" stroke="url(#bt-accent-line)" stroke-width="0.35" opacity="0.6"/>

  <!-- Tagline — gray-700 for good contrast on white -->
  <text x="24" y="30"
        font-family="Sora, 'Plus Jakarta Sans', ui-sans-serif, sans-serif"
        font-weight="400"
        font-size="3.8"
        fill="#2A3447"
        letter-spacing="0.1">Automação · WhatsApp</text>
  <text x="24" y="35"
        font-family="Sora, 'Plus Jakarta Sans', ui-sans-serif, sans-serif"
        font-weight="400"
        font-size="3.8"
        fill="#2A3447"
        letter-spacing="0.1">Inteligência Artificial</text>

  <!-- Micro services line — 3 items, right-edge ≈ 69mm -->
  <text x="24" y="40.5"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-weight="400"
        font-size="2.5"
        fill="#6B7A90"
        letter-spacing="0.05">Chatbots · Atendimento 24h · CRM</text>

  <!-- Location anchor — blue-500 accent on white -->
  <text x="24" y="47"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-weight="500"
        font-size="2.6"
        fill="#2E8BE6"
        letter-spacing="0.8">SALVADOR · BAHIA</text>

</svg>
