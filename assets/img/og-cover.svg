<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Bahia Tecnologia — Automação inteligente para WhatsApp">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0E1E36"/>
    </linearGradient>
    <linearGradient id="og-brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E8BE6"/>
      <stop offset="55%" stop-color="#1FB6A8"/>
      <stop offset="100%" stop-color="#25D366"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <!-- Glow -->
  <ellipse cx="900" cy="200" rx="400" ry="300" fill="rgba(46,139,230,0.10)"/>
  <!-- Logo mark (scaled 3x) -->
  <g transform="translate(80,80) scale(3)">
    <path fill="url(#og-brand)" d="M10 6 h18 a14 14 0 0 1 0 28 h-6 l-6 6 v-6 h-6 a4 4 0 0 1 -4 -4 V10 a4 4 0 0 1 4 -4 z M22 12 h6 a6 6 0 0 1 0 12 h-6 z M22 26 h7 a6 6 0 0 1 0 12 h-7 z" fill-rule="evenodd"/>
    <g fill="#FFFFFF">
      <circle cx="15" cy="20" r="1.6"/>
      <circle cx="20" cy="20" r="1.6"/>
      <circle cx="25" cy="20" r="1.6"/>
    </g>
  </g>
  <!-- Wordmark -->
  <text x="240" y="180" font-family="system-ui,sans-serif" font-size="64" font-weight="700" fill="#FFFFFF">Bahia</text>
  <text x="240" y="240" font-family="system-ui,sans-serif" font-size="40" font-weight="400" fill="url(#og-brand)">Tecnologia</text>
  <!-- Tagline -->
  <text x="80" y="380" font-family="system-ui,sans-serif" font-size="36" fill="#B8C2D1">Automação inteligente para WhatsApp</text>
  <text x="80" y="430" font-family="system-ui,sans-serif" font-size="28" fill="#6B7A90">Atendimento 24/7 com agentes de IA</text>
  <!-- Divider -->
  <rect x="80" y="480" width="120" height="3" fill="url(#og-brand)" rx="2"/>
  <text x="80" y="530" font-family="system-ui,sans-serif" font-size="22" fill="#6B7A90">bahiatecnologia.com.br</text>
