<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 135" width="200" height="135" role="img" aria-labelledby="v2d-title v2d-desc">
  <title id="v2d-title">Bahia Tecnologia — Variação 2D</title>
  <desc id="v2d-desc">Balão oval minimalista com símbolo infinito em gradiente verde–azul. Clean e atemporal.</desc>

  <defs>
    <linearGradient id="gradD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#25D366"/>
      <stop offset="100%" stop-color="#2E8BE6"/>
    </linearGradient>
    <linearGradient id="gradDflat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1B3A66"/>
      <stop offset="100%" stop-color="#13294B"/>
    </linearGradient>
    <linearGradient id="gradDinf" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#25D366"/>
      <stop offset="100%" stop-color="#2E8BE6"/>
    </linearGradient>
  </defs>

  <!-- Oval balloon — subtle dark gradient fill + gradient stroke -->
  <!-- Path traces ellipse ~cx=100 cy=62 rx=78 ry=48, with centered bottom tail -->
  <path
    d="M108,110 C148,110 178,89 178,62 C178,35 148,14 100,14 C52,14 22,35 22,62 C22,89 52,110 92,110 L100,130 L108,110 Z"
    fill="url(#gradDflat)"
    stroke="url(#gradD)"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- "BAHIA TECNOLOGIA" inside the balloon -->
  <text
    x="100" y="57"
    font-family="Arial,Helvetica,sans-serif"
    font-size="22"
    font-weight="700"
    text-anchor="middle"
    letter-spacing="2"
    fill="#F5F7FA"
  >BAHIA</text>

  <text
    x="100" y="78"
    font-family="Arial,Helvetica,sans-serif"
    font-size="11"
    font-weight="400"
    text-anchor="middle"
    letter-spacing="4"
    fill="#F5F7FA"
    fill-opacity="0.85"
  >TECNOLOGIA</text>

</svg>
